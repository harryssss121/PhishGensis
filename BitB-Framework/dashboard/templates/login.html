<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Phish Genesis - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: #00ff88;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #1a1a1a;
      padding: 40px 50px;
      border-radius: 12px;
      border: 2px solid #ff4444;
      width: 380px;
      text-align: center;
      box-shadow: 0 0 30px rgba(255, 68, 68, 0.4);
    }
    h1 {
      color: #ff4444;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #00ff88;
      margin-bottom: 30px;
    }
    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      background: #222;
      border: 1px solid #444;
      border-radius: 6px;
      color: #00ff88;
      font-size: 16px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    button:hover { background: #ff6666; }
    .error { color: #ff6666; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Phish Genesis</h1>
    <p class="subtitle">BitB-Framework Login</p>

    <form method="POST" action="/">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
  </div>
</body>
</html>
